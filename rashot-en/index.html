<!DOCTYPE html><html lang="en" dir="ltr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>Israel Innovation Authority · GEO Quarterly Q2 2026</title>
<style>
:root{--red:#E11D3C;--ink:#1A1614;--sub:#6B6560;--line:#E8E4DD;--bg:#FAF8F4;--card:#fff;--soft:#F4F1EB;--good:#1F9D6B;--gold:#B98900}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Segoe UI",Arial,"Helvetica Neue",sans-serif;line-height:1.55}
.wrap{max-width:1040px;margin:0 auto;padding:26px 20px 60px}
a{color:var(--red);text-decoration:none}a:hover{text-decoration:underline}
.topbar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;border-bottom:1px solid var(--line);padding-bottom:16px;margin-bottom:20px}
.rego{height:30px}.brandmark{font-weight:700;letter-spacing:.02em}
.toggle{margin-inline-start:auto;display:flex;gap:6px;background:var(--soft);border-radius:999px;padding:3px}
.toggle button{border:0;background:transparent;padding:6px 14px;border-radius:999px;cursor:pointer;font-weight:600;color:var(--sub);font-size:13px}
.toggle button[aria-pressed=true]{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.context{display:flex;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:14px}
.clogo{height:46px;border-radius:8px}
.eyebrow{color:var(--red);font-weight:700;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
h1{font-size:26px;margin:2px 0 0}
.meta{margin-inline-start:auto;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.chip{background:var(--soft);border-radius:999px;padding:5px 11px;font-size:12px;color:var(--sub);display:inline-flex;gap:6px;align-items:center}
.live{width:7px;height:7px;border-radius:50%;background:var(--good);display:inline-block}
.srcbar{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 20px}
.srcbtn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:7px 14px;cursor:pointer;font-weight:600;font-size:13px;color:var(--sub);display:flex;align-items:center;gap:7px}
.srcbtn[aria-pressed=true]{border-color:var(--red);color:var(--ink)}
.sd{width:7px;height:7px;border-radius:50%;background:var(--good)}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}
.kpi .lbl{font-size:12px;color:var(--sub);font-weight:600}
.kpi .val{font-size:30px;font-weight:800;margin-top:6px;line-height:1}
.kpi .val .den{font-size:15px;color:var(--sub);font-weight:600}
.kpi .foot{font-size:11px;color:var(--sub);margin-top:6px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:18px}
.card h2{font-size:17px;margin:0 0 4px}.card .csub{color:var(--sub);font-size:13px;margin:0 0 14px}
.trendwrap{display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.trendsvg{flex:1;min-width:300px}
.deltacard{min-width:150px}
.delta{font-size:34px;font-weight:800;color:var(--good)}
.delta .arrow{font-size:22px}
.deltalabel{font-size:12px;color:var(--sub)}
.clrow{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
.clrow:last-child{border-bottom:0}
.clname{flex:1;font-weight:600}
.badge{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px}
.b-full{background:rgba(31,157,107,.12);color:var(--good)}
.b-part{background:rgba(185,137,0,.12);color:var(--gold)}
.b-opp{background:rgba(225,29,60,.10);color:var(--red)}
.track{width:120px;height:8px;background:var(--soft);border-radius:999px;overflow:hidden}
.fill{height:100%;background:var(--red);border-radius:999px}
.qlist{display:none;padding:6px 0 12px}
.qlist.open{display:block}
.qi{display:flex;gap:9px;padding:6px 0;font-size:13px;align-items:flex-start;border-top:1px dashed var(--line)}
.qi .mk{width:18px;height:18px;flex:none;border-radius:50%;display:grid;place-items:center;font-size:11px;color:#fff;margin-top:1px}
.qi .mk.y{background:var(--good)}.qi .mk.n{background:#CBC6BE}
.qi .qt{flex:1}.qi .qu{display:block;font-size:11px;color:var(--sub);margin-top:2px;word-break:break-all}
.mrow{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px solid var(--line)}
.mrow:last-child{border-bottom:0}
.mstate{font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;flex:none}
.mstate.cited{background:rgba(31,157,107,.12);color:var(--good)}
.mstate.pending{background:var(--soft);color:var(--sub)}
.murl{font-size:13px;word-break:break-all}.mq{font-size:12px;color:var(--sub);margin-top:3px}
.msrc{font-size:11px;color:var(--good);font-weight:600}
.alist{columns:2;column-gap:26px}
@media(max-width:720px){.kpis{grid-template-columns:repeat(2,1fr)}.alist{columns:1}}
.ai{display:flex;gap:9px;padding:8px 0;font-size:13px;break-inside:avoid;align-items:flex-start}
.ai .dot{color:var(--good);font-weight:800;margin-top:1px}
.foot{color:var(--sub);font-size:12px;text-align:center;margin-top:26px}
.note{background:var(--soft);border-radius:10px;padding:11px 13px;font-size:12px;color:var(--sub);margin-top:10px}
</style></head><body><div class="wrap">

function trendSvg(pts){

 const vals=pts.map(p=>p.v),peak=Math.max(...vals,1);
 const x=i=>pl+i*(W-pl-pr)/(n-1),y=v=>pt+(1-v/peak)*(H-pt-pb);

 const gy=[0,Math.round(peak/2),peak];
 const grid=gy.map(v=>`<line x1="${pl}" y1="${y(v).toFixed(1)}" x2="${W-pr}" y2="${y(v).toFixed(1)}" stroke="var(--line)"/>`+
   `<text x="${pl-6}" y="${(y(v)+3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--sub)">${v}</text>`).join("");
 const ticks=pts.map((p,i)=> (i%3===0||i===n-1)?`<text x="${x(i).toFixed(1)}" y="${H-6}" text-anchor="middle" font-size="9" fill="var(--sub)">${p.d}</text>`:"").join("");
 return `<svg class="trendsvg" viewBox="0 0 ${W} ${H}" role="img"><defs><linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#E11D3C" stop-opacity=".20"/><stop offset="1" stop-color="#E11D3C" stop-opacity="0"/></linearGradient></defs>
  ${grid}<path d="${area}" fill="url(#g)"/><path d="${line}" fill="none" stroke="#E11D3C" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="${P[n-1][0].toFixed(1)}" cy="${P[n-1][1].toFixed(1)}" r="4" fill="#fff" stroke="#E11D3C" stroke-width="2.5"/>${ticks}</svg>`;
}
