let lang = "he", source = "chatgpt";
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const fmt = n => Number.isInteger(n)? n : Math.round(n*10)/10;
const info = txt => `<span class="info"><span class="i" tabindex="0" role="button" aria-label="info">i</span><span class="tip">${esc(txt)}</span></span>`;

function ring(v){ const r=78,c=2*Math.PI*r,off=c*(1-v/100);
  return `<svg viewBox="0 0 188 188" width="188" height="188" role="img" aria-label="${fmt(v)}%">
   <defs><linearGradient id="rg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E11D3C"/><stop offset="1" stop-color="#FF5C7C"/></linearGradient></defs>
   <circle cx="94" cy="94" r="${r}" fill="none" stroke="#F1EFE9" stroke-width="15"/>
   <circle cx="94" cy="94" r="${r}" fill="none" stroke="url(#rg)" stroke-width="15" stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}" transform="rotate(-90 94 94)" style="transition:stroke-dashoffset .9s cubic-bezier(.2,.8,.2,1)"/></svg>`; }

function trend(daily,startISO){ const W=520,H=180,pl=8,pr=8,pt=16,pb=8,n=daily.length,max=Math.max(...daily)+1;
  const x=i=>pl+i*(W-pl-pr)/(n-1), y=v=>pt+(1-v/max)*(H-pt-pb);
  const pts=daily.map((v,i)=>[x(i),y(v)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=`M ${x(0).toFixed(1)} ${(H-pb).toFixed(1)} `+pts.map(p=>"L"+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ")+` L ${x(n-1).toFixed(1)} ${(H-pb).toFixed(1)} Z`;
  const last=pts[n-1], sd=new Date(startISO);
  const dl=i=>{const d=new Date(sd);d.setDate(sd.getDate()+i);return d.getDate()+"/"+(d.getMonth()+1);};
  const ticks=[0,Math.round((n-1)/2),n-1].map(i=>`<span>${dl(i)}</span>`).join("");
  return `<div class="trendbox"><svg viewBox="0 0 ${W} ${H}" width="100%" height="180" preserveAspectRatio="none" role="img">
   <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#E11D3C" stop-opacity=".22"/><stop offset="1" stop-color="#E11D3C" stop-opacity="0"/></linearGradient></defs>
   <path d="${area}" fill="url(#tg)"/><path d="${line}" fill="none" stroke="#E11D3C" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
   <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="4.5" fill="#fff" stroke="#E11D3C" stroke-width="2.5"/></svg>
   <div class="axislabels">${ticks}</div></div>`; }

const checkSvg = '<svg viewBox="0 0 24 24"><path d="M5 12l5 5 9-10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
const dashSvg  = '<svg viewBox="0 0 24 24"><path d="M6 12h12" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>';

function kic(t){const p={ment:'<path d="M4 5h16v10H8l-4 4z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>',
  cite:'<path d="M7 8h10M7 12h7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>',
  eye:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="2.5" fill="none" stroke="currentColor" stroke-width="2"/>',
  sov:'<path d="M3 13a9 9 0 1 0 9-9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 12l5-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>'}[t];
  return `<span class="glyph"><svg viewBox="0 0 24 24">${p}</svg></span>`;}

function statusOf(c){ return c>=3 ? "full" : (c>=1 ? "part" : "opp"); }

function srcBar(t){
  return `<div class="srcwrap"><span class="srclbl">${t.srcTitle}</span><div class="srcbar">
    ${SOURCES.map(s=>{
      const tracked = !!(DATA.sources[s.id] && DATA.sources[s.id].tracked);
      const dot = s.unsupported ? '' : `<span class="sd ${tracked?'on':'off'}"></span>`;
      return `<button class="srcbtn" data-src="${s.id}" ${source===s.id?'aria-pressed="true"':''}>${dot}${s.label}</button>`;
    }).join("")}
  </div></div>`;
}

function render(){
  const t=DICT[lang];
  document.documentElement.lang=lang; document.documentElement.dir = lang==="he"?"rtl":"ltr";
  $("#markSub").textContent=t.geoSub;
  $("#langHe").setAttribute("aria-pressed",lang==="he"); $("#langEn").setAttribute("aria-pressed",lang==="en");

  const head = `
    <div class="context">
      <div class="clientline"><span class="logobox"><img class="clogo" src="${CLIENT_LOGO}" alt="${esc(DATA.name[lang])}"></span>
        <div><div class="eyebrow">${t.report} · ${esc(DATA.period[lang])}</div><h1>${esc(DATA.name[lang])}</h1></div></div>
      <div class="spacer"></div>
      <div class="meta">
        <span class="chip"><span class="live"></span>${t.live}</span>
        <span class="chip">${t.market}: ${esc(DATA.market)}</span>
        <span class="chip">${t.since} ${esc(DATA.sinceDate)}</span></div>
    </div>
    ${srcBar(t)}`;

  const srcObj = DATA.sources[source];
  const selMeta = SOURCES.find(s=>s.id===source);

  if(!srcObj || !srcObj.tracked){
    const unsupported = selMeta && selMeta.unsupported;
    $("#app").innerHTML = head + `
      <div class="card" style="margin-top:8px"><div class="emptysrc">
        <div class="ic"><svg viewBox="0 0 24 24" width="26" height="26"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 7v6M12 16h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></div>
        <h3>${unsupported? esc(t.claudeH) : esc(t.notTrackedH(selMeta?selMeta.label:source))}</h3>
        <p>${unsupported? esc(t.claudeP) : esc(t.notTrackedP)}</p>
      </div></div>`;
    return;
  }

  const d=srcObj;
  const avg=d.mentionsDaily.reduce((a,b)=>a+b,0)/d.mentionsDaily.length, peak=Math.max(...d.mentionsDaily);
  const ownSov=d.sov.find(s=>s.own).v, maxSov=Math.max(...d.sov.map(s=>s.v));
  const maxMent=Math.max(...d.mentionsByBrand.map(b=>b.solo+b.shared)), maxDom=Math.max(...d.domains.map(x=>x.r));
  const totalQ=d.clusters.reduce((a,c)=>a+c.q.length,0);
  const citedQ=d.clusters.reduce((a,c)=>a+c.q.filter(x=>x.c).length,0);

  $("#app").innerHTML = head + `
    <div class="grid hero-grid" style="margin-top:8px">
      <div class="card"><h2>${t.sov}${info(t.sovTip)}</h2>
        <div class="hero">
          <div class="ring">${ring(ownSov)}<div class="center"><div class="big num">${fmt(ownSov)}<sup>%</sup></div><div class="lbl">${t.sovLbl}</div></div></div>
          <div class="copy"><p>${t.heroLead(esc(DATA.name[lang]),fmt(ownSov))}</p>
            <div class="sovbars">${d.sov.map(s=>`
              <div class="sovrow ${s.own?'own':''}"><span class="name">${esc(s.name[lang])}</span>
                <span class="track"><span class="fill" style="width:${(s.v/Math.max(maxSov,1)*100).toFixed(1)}%"></span></span>
                <span class="val num">${fmt(s.v)}%</span></div>`).join("")}</div>
          </div>
        </div>
      </div>
      <div class="grid kpis" style="align-content:start">
        <div class="card kpi"><div class="k-top"><span class="k-label">${t.kVis}${info(t.kVisTip)}</span>${kic('eye')}</div>
          <div class="k-val num">${citedQ}<span class="den">/${totalQ}</span></div><div class="k-sub">${t.kVisSub(totalQ)}</div></div>
        <div class="card kpi"><div class="k-top"><span class="k-label">${t.kPages}${info(t.kPagesTip)}</span>${kic('cite')}</div>
          <div class="k-val num">${d.citedPages.length}</div><div class="k-sub">emcol.co.il</div></div>
        <div class="card kpi"><div class="k-top"><span class="k-label">${t.kMentions}</span>${kic('ment')}</div>
          <div class="k-val num">${fmt(avg)}</div><div class="k-sub">${t.avgDay} · ${t.kPeak} ${peak}</div></div>
        <div class="card kpi"><div class="k-top"><span class="k-label">${t.sov}${info(t.sovTip)}</span>${kic('sov')}</div>
          <div class="k-val num">${fmt(ownSov)}<sup>%</sup></div><div class="k-sub">ChatGPT · ${esc(DATA.market)}</div></div>
      </div>
    </div>

    <div class="grid two" style="margin-top:16px">
      <div class="card"><h2>${t.trendCard}</h2>${trend(d.mentionsDaily,d.mentionsStart)}<div class="sub" style="margin-top:6px">${t.trendSub}</div></div>
      <div class="card"><h2>${t.mentCard} · <span class="sub">${t.mentSub}</span></h2>
        <div class="mlist">${d.mentionsByBrand.map(b=>{const tot=b.solo+b.shared;return `
          <div class="mrow ${b.own?'own':'comp'}"><span class="name">${esc(b.name[lang])}</span>
            <span class="track"><span class="seg solo" style="width:${tot?(b.solo/Math.max(maxMent,1)*100).toFixed(1):0}%"></span>
              <span class="seg shared" style="width:${tot?(b.shared/Math.max(maxMent,1)*100).toFixed(1):0}%"></span></span>
            <span class="v">${tot}</span></div>`;}).join("")}</div>
        <div class="legend"><span><i style="background:var(--brand)"></i>${t.solo}</span><span><i style="background:var(--brand-soft)"></i>${t.shared}</span></div>
      </div>
    </div>

    <div class="sechead"><h2>${t.clustersH}${info(t.clTip)}</h2><span class="line"></span><span class="count">${citedQ}/${totalQ}</span></div>
    <div class="clusters">${d.clusters.map((c,i)=>{
      const cc=c.q.filter(x=>x.c).length, st=statusOf(cc);
      const stTxt = st==="full"?t.full:(st==="part"?t.part:t.opp);
      return `<details class="cl" ${i===0?'open':''}><summary>
        <span class="idx num">${String(i+1).padStart(2,'0')}</span>
        <span class="cn"><b>${esc(c.name[lang])}</b><small class="ratio">${t.inQ(cc)}</small></span>
        <span class="status ${st}">${stTxt}</span>
        <svg class="caret" width="16" height="16" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </summary><div class="qs">${c.q.map(q=>`
        <div class="qrow ${q.c?'hit':'miss'}">
          <span class="qmark ${q.c?'hit':'miss'}" title="${q.c?esc(t.qCited):esc(t.qMiss)}">${q.c?checkSvg:dashSvg}</span>
          <div class="qbody"><span class="qtext">${esc(q.t)}</span>
            ${q.c&&q.u?`<div class="qpages">${q.u.map(p=>`<a href="https://${esc(p.url)}" target="_blank" rel="noopener">${esc(p.url)}${p.note?` <span class="pn">— ${esc(p.note)}</span>`:''}</a>`).join("")}</div>`:''}
          </div>
        </div>`).join("")}</div></details>`;
    }).join("")}</div>

    <div class="sechead"><h2>${t.actionsH}</h2><span class="line"></span><span class="count">${(DATA.actions||[]).length}</span></div>
    <div class="card"><div class="rows">${(DATA.actions&&DATA.actions.length)? DATA.actions.map(a=>`
      <div class="arow"><span class="abolt"><svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6z" fill="currentColor"/></svg></span>
        <span class="atext">${esc(a.task)}</span>
        ${a.link?`<a class="alink" href="${esc(a.link)}" target="_blank" rel="noopener">${t.fileLink}</a>`:""}</div>`).join("") : `<div class="aempty">${t.noActions}</div>`}</div>
      <div class="sub" style="margin-top:12px">${t.actionsNote}</div></div>

    <div class="grid two" style="margin-top:16px">
      <div class="card"><h2>${t.pagesCard}</h2><div class="rows">${d.citedPages.map(p=>`
        <div class="prow"><span class="badge num">${p.q}</span><span class="pt"><b>${esc(p.label[lang])}</b><a href="https://${esc(p.url)}" target="_blank" rel="noopener">${esc(p.url)}</a></span></div>`).join("")}</div>
        <div class="sub" style="margin-top:12px">${t.pagesNote}</div></div>
      <div class="card"><h2>${t.domainsCard}</h2><div class="rows">${d.domains.map(x=>`
        <div class="drow ${x.own?'own':''}"><span class="dn">${esc(x.d)}${x.own?`<span class="tag brand">${t.brandTag}</span>`:(x.dir?`<span class="tag dir">${t.dirTag}</span>`:"")}</span>
          <span class="dt"><span class="df" style="width:${(x.r/maxDom*100).toFixed(0)}%"></span></span><span class="dv">${x.r}</span></div>`).join("")}</div>
        <div class="sub" style="margin-top:12px">${t.domainsNote}</div></div>
    </div>

    <footer><b>${t.methodTitle}.</b> ${t.method(esc(DATA.period[lang]))}</footer>
    <div class="prepared"><img src="${REGO_LOGO}" alt="ReGo"><span>${t.preparedBy}</span></div>`;
}

$("#langHe").addEventListener("click",()=>{lang="he";render();});
$("#langEn").addEventListener("click",()=>{lang="en";render();});
document.addEventListener("click",e=>{
  const sb=e.target.closest(".srcbtn"); if(sb){ source=sb.dataset.src; render(); return; }
  const ic=e.target.closest(".info .i");
  document.querySelectorAll(".info.open").forEach(el=>{ if(!ic || !el.contains(ic)) el.classList.remove("open"); });
  if(ic){ ic.parentElement.classList.toggle("open"); }
});
document.getElementById("regoLogo").src=REGO_LOGO;
render();
</script>
</body>
</html>
